<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ page.title | default: "Curriculum Vitae" }}</title>
  <meta name="description" content="{{ page.description | default: "CV for Michael F. McCoy III." }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #fff;
      font-family: Arial, sans-serif;
    }

    .cv-page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .cv-page iframe {
      width: min(1000px, 96vw);
      height: 100vh;
      border: 0;
    }

    .fallback {
      text-align: center;
      margin: 1rem 0 2rem;
    }

    .mobile-only {
      display: none;
    }

    .cv-mobile {
      text-align: center;
      padding: 2rem 1rem;
    }

    .cv-button {
      display: inline-block;
      padding: 0.85rem 1.2rem;
      text-decoration: none;
      border: 1px solid #ccc;
      border-radius: 8px;
      color: #111;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .desktop-only {
        display: none;
      }

      .mobile-only {
        display: block;
      }
    }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
