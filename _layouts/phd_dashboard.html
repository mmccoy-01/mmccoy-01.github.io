<!DOCTYPE html>
<html lang="{{ site.language }}" class="no-js">
    {% include head.html %}
    <body class="has-push-menu phd-dashboard-page">
        {% include svg-icons.html %}
        {% include header.html %}

        <main class="phd-dashboard-content" role="main">
            {{ content }}
        </main>

        {% include footer.html %}

        {% if page.math %}
        <script>
            MathJax = {
                tex: {
                    inlineMath: [['$', '$'], ['\\(', '\\)']]
                }
            };
        </script>
        <script type="text/javascript" id="MathJax-script" async
            src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
        </script>
        {% endif %}
    </body>
</html>
