<!DOCTYPE html>
<html lang="{{ site.language }}" class="no-js">
    {% include head.html %}
    <body class="has-push-menu phd-dashboard-page">
        {% include svg-icons.html %}
        {% include header.html %}

        <style>
            body.phd-dashboard-page {
                background:
                    radial-gradient(circle at top left, rgba(139,211,255,0.24), transparent 34rem),
                    radial-gradient(circle at top right, rgba(184,255,218,0.15), transparent 28rem),
                    radial-gradient(circle at 50% 12%, rgba(216,199,255,0.10), transparent 32rem),
                    linear-gradient(160deg, #050814, #09111f) !important;
                color: #eef4ff !important;
            }

            body.phd-dashboard-page .phd-dashboard-content {
                min-height: calc(100vh - 160px);
                padding: 0;
                background: transparent !important;
            }

            body.phd-dashboard-page .post,
            body.phd-dashboard-page .post-content,
            body.phd-dashboard-page article {
                background: transparent !important;
            }

            /* Keep the site header dark on load and after scroll. */
            body.phd-dashboard-page header,
            body.phd-dashboard-page .header,
            body.phd-dashboard-page .site-header,
            body.phd-dashboard-page .bar-header,
            body.phd-dashboard-page .main-header,
            body.phd-dashboard-page .nav,
            body.phd-dashboard-page .navbar,
            body.phd-dashboard-page .has-push-menu header,
            body.phd-dashboard-page header.is-fixed,
            body.phd-dashboard-page header.is-visible,
            body.phd-dashboard-page header.is-active,
            body.phd-dashboard-page header.fixed,
            body.phd-dashboard-page header.scrolled,
            body.phd-dashboard-page .header.is-fixed,
            body.phd-dashboard-page .header.is-visible,
            body.phd-dashboard-page .header.is-active,
            body.phd-dashboard-page .header.fixed,
            body.phd-dashboard-page .header.scrolled {
                background: rgba(5, 8, 20, 0.96) !important;
                color: #eef4ff !important;
                border-bottom-color: rgba(148, 163, 184, 0.18) !important;
                box-shadow: 0 12px 32px rgba(0, 0, 0, 0.24) !important;
            }

            body.phd-dashboard-page header a,
            body.phd-dashboard-page .header a,
            body.phd-dashboard-page .site-header a,
            body.phd-dashboard-page .bar-header a,
            body.phd-dashboard-page .main-header a,
            body.phd-dashboard-page .nav a,
            body.phd-dashboard-page .navbar a {
                color: #eef4ff !important;
            }

            /* Make the footer match the dashboard instead of appearing as a white block. */
            body.phd-dashboard-page footer,
            body.phd-dashboard-page .footer,
            body.phd-dashboard-page .site-footer,
            body.phd-dashboard-page .main-footer,
            body.phd-dashboard-page .page-footer {
                background: rgba(5, 8, 20, 0.96) !important;
                color: #cbd5e1 !important;
                border-top: 1px solid rgba(148, 163, 184, 0.18) !important;
                box-shadow: none !important;
            }

            body.phd-dashboard-page footer a,
            body.phd-dashboard-page .footer a,
            body.phd-dashboard-page .site-footer a,
            body.phd-dashboard-page .main-footer a,
            body.phd-dashboard-page .page-footer a {
                color: #cbd5e1 !important;
            }
        </style>

        <main class="phd-dashboard-content" role="main">
            {{ content }}
        </main>

        {% include footer.html %}
    </body>
</html>
